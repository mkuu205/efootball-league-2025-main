<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - eFootball League 2026</title>
    <link rel="icon" href="/icons/icon-192x192.png" sizes="192x192" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-400: #06b6d4;
            --primary-500: #0891b2;
            --bg-card: #1e293b;
            --bg-tertiary: #0f172a;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --gradient-primary: linear-gradient(135deg, #06b6d4, #3b82f6);
            --gradient-secondary: linear-gradient(135deg, #f97316, #ef4444);
            --radius-sm: 0.375rem;
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
        }
        [data-theme="dark"] {
            --bg-card: #1e293b;
            --bg-tertiary: #0f172a;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0f1a;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-info { background: var(--info); color: white; }
        .badge-neutral { background: var(--text-muted); color: white; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .dashboard-header {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .dashboard-header .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-500);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            object-fit: cover;
        }
        .dashboard-header .player-info h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }
        .dashboard-header .player-team {
            color: var(--primary-400);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .dashboard-header .quick-stats {
            margin-left: auto;
            display: flex;
            gap: 1.5rem;
            text-align: center;
        }
        .dashboard-header .quick-stat {
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
        }
        .dashboard-header .quick-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card-enhanced {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card-enhanced::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }
        .stat-card-enhanced .stat-value {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card-enhanced .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .card-header {
            background: rgba(6, 182, 212, 0.1);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            font-weight: 600;
        }
        .card-body {
            padding: 1.25rem;
        }
        .form-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .form-W { background: var(--success); color: white; }
        .form-D { background: var(--warning); color: #1a1a2e; }
        .form-L { background: var(--error); color: white; }
        .receipt-btn {
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid var(--primary-500);
            color: var(--primary-400);
            border-radius: var(--radius-sm);
            padding: 0.35rem 0.85rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .receipt-btn:hover {
            background: var(--primary-500);
            color: white;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .football-loader {
            position: relative;
            width: 60px;
            height: 80px;
        }
        .football {
            font-size: 3rem;
            animation: bounce 0.6s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border-color);
            border-top-color: var(--primary-500);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; text-align: center; }
            .dashboard-header .quick-stats { margin-left: 0; margin-top: 1rem; justify-content: center; }
        }
        @media (max-width: 640px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;">
            <div class="football-loader">
                <div class="football">⚽</div>
                <div class="football-shadow" style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 10px; background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%); border-radius: 50%; animation: bounce 0.6s ease-in-out infinite;"></div>
            </div>
            <div style="color: var(--text-muted); font-size: 0.9rem; font-family: 'Orbitron', sans-serif;">Loading eFootball League 2026...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // BACKEND URL - FIXED to use render.com backend
        const BACKEND_API_URL = 'https://backend-w2cx.onrender.com';
        
        let supabaseInstance = null;
        function getSupabaseInstance() {
            if (!supabaseInstance) {
                supabaseInstance = window.supabase.createClient(
                    'https://zliedzrqzvywlsyfggcq.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsaWVkenJxenZ5d2xzeWZnZ2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwOTE4NjYsImV4cCI6MjA3NjY2Nzg2Nn0.NbzEZ4ievehtrlyOxCK_mheb7YU4SnNgC0uXuOKPNOI'
                );
            }
            return supabaseInstance;
        }
        const supabase = getSupabaseInstance();

        // FIXED receipt download using backend-w2cx.onrender.com
        const downloadReceipt = (paymentId) => {
            if (!paymentId) {
                console.error("No payment ID provided");
                return;
            }
            console.log("Downloading receipt for payment ID:", paymentId, "via backend:", BACKEND_API_URL);
            const receiptUrl = `${BACKEND_API_URL}/api/receipt/${paymentId}`;
            window.open(receiptUrl, '_blank');
        };

        const calculateTeamStrength = (stats) => {
            const goalDiff = (stats.gf || 0) - (stats.ga || 0);
            let strength = 2000 + (stats.wins * 20) + (stats.points * 5) + (goalDiff * 2);
            strength = Math.min(4500, Math.max(1500, strength));
            return Math.floor(strength);
        };

        const Spinner = ({ size = 24 }) => (
            <div style={{ width: size, height: size, border: '2px solid var(--border-color)', borderTopColor: 'var(--primary-500)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></div>
        );

        const Navbar = ({ player, session, onLogout }) => (
            <nav className="navbar">
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', maxWidth: '1400px', margin: '0 auto', padding: '0 1.5rem' }}>
                    <a href="/" className="navbar-brand" style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', textDecoration: 'none' }}>
                        <div style={{ width: '45px', height: '45px', background: 'var(--gradient-primary)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: '1rem', color: 'white', fontFamily: "'Orbitron', sans-serif" }}>EFL</div>
                        <span style={{ fontFamily: "'Orbitron', sans-serif", fontWeight: 700, color: 'var(--text-primary)' }}>eFootball League 2026</span>
                    </a>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1.5rem' }}>
                        <img src={player?.photo || `https://ui-avatars.com/api/?name=${session?.name}&background=334e68&color=fff`} alt="Avatar" style={{ width: 36, height: 36, borderRadius: '50%', border: '2px solid var(--primary-500)', objectFit: 'cover' }} />
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                            <span style={{ fontWeight: 500, fontSize: '0.9rem' }}>{session?.name}</span>
                            <span style={{ color: 'var(--text-muted)' }}>•</span>
                            <span style={{ fontSize: '0.85rem', color: 'var(--primary-400)' }}>{player?.team || '-'}</span>
                        </div>
                        <span onClick={onLogout} style={{ color: 'var(--text-muted)', cursor: 'pointer', fontSize: '0.9rem' }}>Logout</span>
                    </div>
                </div>
            </nav>
        );

        const StatCard = ({ value, label, icon }) => (
            <div className="stat-card-enhanced">
                {icon && <div style={{ fontSize: '1.5rem', marginBottom: '0.5rem', opacity: 0.8 }}>{icon}</div>}
                <div className="stat-value">{value}</div>
                <div className="stat-label">{label}</div>
            </div>
        );

        const FormBadge = ({ result }) => <span className={`form-badge form-${result}`}>{result}</span>;

        const Card = ({ title, children }) => (
            <div className="card">
                <div className="card-header">{title}</div>
                <div className="card-body">{children}</div>
            </div>
        );

        const Dashboard = () => {
            const [session, setSession] = useState(null);
            const [player, setPlayer] = useState(null);
            const [stats, setStats] = useState({ played: 0, wins: 0, draws: 0, losses: 0, points: 0, gf: 0, ga: 0 });
            const [position, setPosition] = useState('-');
            const [teamStrength, setTeamStrength] = useState(2000);
            const [form, setForm] = useState([]);
            const [fixtures, setFixtures] = useState([]);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [paymentReceipts, setPaymentReceipts] = useState([]);
            const [availableTournaments, setAvailableTournaments] = useState([]);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [paymentTournament, setPaymentTournament] = useState(null);
            const [paymentPhone, setPaymentPhone] = useState('');
            const [paymentStatus, setPaymentStatus] = useState('');
            const [paymentMessage, setPaymentMessage] = useState('');

            useEffect(() => {
                const sess = localStorage.getItem('player_session') || sessionStorage.getItem('player_session');
                if (!sess) {
                    window.location.href = '/player-login.html';
                    return;
                }
                const data = JSON.parse(sess);
                console.log("✅ Dashboard user session loaded:", data);
                setSession(data);
                loadDashboardData(data);
            }, []);

            const loadDashboardData = async (sess) => {
                setLoading(true);
                try {
                    console.log("🔄 Loading dashboard data for user:", sess);
                    
                    const { data: account, error: accountError } = await supabase
                        .from('player_accounts')
                        .select('*')
                        .eq('id', sess.account_id || sess.id)
                        .single();
                    
                    if (accountError) {
                        console.error("❌ Error loading account:", accountError);
                        setLoading(false);
                        return;
                    }
                    
                    console.log("📋 Account loaded:", account);

                    // Load tournaments
                    try {
                        const tournamentsRes = await fetch(`${BACKEND_API_URL}/api/tournaments`);
                        const tournamentsData = await tournamentsRes.json();
                        if (tournamentsData.success) {
                            setAvailableTournaments((tournamentsData.tournaments || []).map(t => ({ ...t, alreadyJoined: false, canJoin: t.status === 'registration_open' })));
                        }
                    } catch (e) { console.error('Error loading tournaments:', e); }

                    if (!account?.player_id) {
                        setPlayer({ ...account, photo: account.photo_url || null, team: account.preferred_team || null });
                        setLoading(false);
                        return;
                    }

                    const { data: playerData } = await supabase.from('players').select('*').eq('id', account.player_id).single();
                    setPlayer({ ...playerData, ...account, photo: account.photo_url || playerData?.photo || null, team: account.preferred_team || playerData?.team || null });

                    const [playersRes, resultsRes, fixturesRes] = await Promise.all([
                        supabase.from('players').select('*'),
                        supabase.from('results').select('*'),
                        supabase.from('fixtures').select('*')
                    ]);

                    const allPlayers = playersRes.data || [];
                    const allResults = resultsRes.data || [];
                    const allFixtures = fixturesRes.data || [];

                    const playerResults = allResults.filter(r => r.home_player_id === account.player_id || r.away_player_id === account.player_id);
                    let calcStats = { played: 0, wins: 0, draws: 0, losses: 0, points: 0, gf: 0, ga: 0 };
                    
                    playerResults.forEach(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        calcStats.played++;
                        calcStats.gf += pScore || 0;
                        calcStats.ga += oScore || 0;
                        if (pScore > oScore) { calcStats.wins++; calcStats.points += 3; }
                        else if (pScore === oScore) { calcStats.draws++; calcStats.points += 1; }
                        else { calcStats.losses++; }
                    });

                    setStats(calcStats);
                    const strength = calculateTeamStrength(calcStats);
                    setTeamStrength(strength);
                    
                    // Fix: avoid 400 error by ensuring we only update if account exists and ID is valid
                    if (account?.id) {
                        try {
                            await supabase.from('player_accounts').update({ team_strength: strength }).eq('id', account.id);
                        } catch (updateErr) {
                            console.warn("Team strength update skipped:", updateErr);
                        }
                    }

                    const leagueTable = allPlayers.map(p => {
                        const pResults = allResults.filter(r => r.home_player_id === p.id || r.away_player_id === p.id);
                        let pts = 0, gd = 0;
                        pResults.forEach(r => {
                            const isHome = r.home_player_id === p.id;
                            const pScore = isHome ? r.home_score : r.away_score;
                            const oScore = isHome ? r.away_score : r.home_score;
                            gd += (pScore || 0) - (oScore || 0);
                            if (pScore > oScore) pts += 3;
                            else if (pScore === oScore) pts += 1;
                        });
                        return { id: p.id, pts, gd };
                    }).sort((a, b) => b.pts - a.pts || b.gd - a.gd);
                    const pos = leagueTable.findIndex(p => p.id === account.player_id) + 1;
                    setPosition(pos > 0 ? pos : '-');

                    const recentForm = playerResults.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5).map(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        if (pScore > oScore) return 'W';
                        if (pScore === oScore) return 'D';
                        return 'L';
                    }).reverse();
                    setForm(recentForm);

                    const upcomingFixtures = allFixtures.filter(f => !f.played && (f.home_player_id === account.player_id || f.away_player_id === account.player_id))
                        .sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 3).map(f => {
                            const isHome = f.home_player_id === account.player_id;
                            const opponent = allPlayers.find(p => p.id === (isHome ? f.away_player_id : f.home_player_id));
                            return { ...f, opponent, isHome };
                        });
                    setFixtures(upcomingFixtures);

                    const recentResults = playerResults.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3).map(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const opponent = allPlayers.find(p => p.id === (isHome ? r.away_player_id : r.home_player_id));
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        let result = 'D';
                        if (pScore > oScore) result = 'W';
                        else if (pScore < oScore) result = 'L';
                        return { ...r, opponent, pScore, oScore, result };
                    });
                    setResults(recentResults);

                    // Load payments
                    const { data: paymentsData } = await supabase
                        .from('payments')
                        .select('*')
                        .eq('player_account_id', account.id)
                        .eq('status', 'completed')
                        .order('created_at', { ascending: false });

                    console.log("💰 Payment receipts loaded:", paymentsData);
                    setPaymentReceipts(paymentsData || []);
                    
                    // Update tournaments with join status
                    try {
                        const { data: participantData } = await supabase
                            .from('tournament_participants')
                            .select('tournament_id')
                            .or(`player_id.eq.${account.player_id},player_account_id.eq.${account.id}`);
                        const joinedIds = (participantData || []).map(p => Number(p.tournament_id));
                        
                        const tournamentsRes = await fetch(`${BACKEND_API_URL}/api/tournaments`);
                        const tournamentsData = await tournamentsRes.json();
                        if (tournamentsData.success) {
                            setAvailableTournaments((tournamentsData.tournaments || []).map(t => ({ 
                                ...t, 
                                alreadyJoined: joinedIds.includes(Number(t.id)),
                                canJoin: t.status === 'registration_open' && !joinedIds.includes(Number(t.id))
                            })));
                        }
                    } catch (e) { console.error('Error loading tournaments:', e); }
                    
                } catch (err) { 
                    console.error('Error loading dashboard:', err);
                } finally { setLoading(false); }
            };

            const logout = () => {
                localStorage.removeItem('player_session');
                sessionStorage.removeItem('player_session');
                window.location.href = '/player-login.html';
            };

            const formatPhoneNumber = (phone) => {
                if (!phone) return null;
                let cleaned = phone.replace(/[\s\-\(\)]/g, '');
                if (cleaned.startsWith('+254')) cleaned = cleaned.substring(1);
                else if (cleaned.startsWith('0')) cleaned = '254' + cleaned.substring(1);
                else if (cleaned.startsWith('7') || cleaned.startsWith('1')) cleaned = '254' + cleaned;
                return /^254\d{9}$/.test(cleaned) ? cleaned : null;
            };

            const openPaymentModal = (tournament) => {
                const savedPhone = formatPhoneNumber(session?.phone);
                setPaymentTournament(tournament);
                setPaymentPhone(savedPhone ? '0' + savedPhone.substring(3) : '');
                setPaymentStatus('');
                setPaymentMessage('');
                setShowPaymentModal(true);
            };

            const processPayment = async () => {
                const tournament = paymentTournament;
                const phoneNumber = formatPhoneNumber(paymentPhone);
                if (!phoneNumber) { setPaymentMessage('Please enter a valid phone number'); return; }
                setPaymentStatus('sending');
                setPaymentMessage('Sending M-Pesa request...');
                try {
                    const payRes = await fetch(`${BACKEND_API_URL}/api/payflow/stk-push`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phoneNumber, amount: tournament.entry_fee, reference: `TOURN${tournament.id}_${session?.account_id || session?.id}`, description: `Tournament: ${tournament.name}`, account_id: session?.account_id || session?.id, tournament_id: tournament.id })
                    });
                    const payData = await payRes.json();
                    if (payData.success) {
                        setPaymentStatus('waiting');
                        setPaymentMessage('Check your phone for M-Pesa prompt and enter your PIN');
                        let attempts = 0;
                        const checkPayment = setInterval(async () => {
                            attempts++;
                            setPaymentMessage(`Waiting for payment... (${attempts}/24)`);
                            try {
                                const statusRes = await fetch(`${BACKEND_API_URL}/api/payflow/status`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ checkout_request_id: payData.checkout_request_id }) });
                                const statusData = await statusRes.json();
                                if (statusData.status === 'completed') {
                                    clearInterval(checkPayment);
                                    setPaymentStatus('success');
                                    setPaymentMessage('Payment received! Adding you to tournament...');
                                    
                                    const joinRes = await fetch(`${BACKEND_API_URL}/api/tournaments/join`, { 
                                        method: 'POST', 
                                        headers: { 'Content-Type': 'application/json' }, 
                                        body: JSON.stringify({ tournament_id: tournament.id, player_account_id: session?.account_id || session?.id, payment_id: statusData.payment_id }) 
                                    });
                                    const joinData = await joinRes.json();
                                    
                                    if (joinData.success) {
                                        setPaymentMessage(`Success! You're now in ${tournament.name}!`);
                                        setTimeout(() => { 
                                            setShowPaymentModal(false);
                                            loadDashboardData(session);
                                        }, 2000);
                                    } else { 
                                        setPaymentStatus('error'); 
                                        setPaymentMessage(joinData.message || 'Failed to join tournament'); 
                                    }
                                } else if (statusData.status === 'failed') {
                                    clearInterval(checkPayment);
                                    setPaymentStatus('error');
                                    setPaymentMessage('Payment failed or cancelled');
                                } else if (attempts >= 24) {
                                    clearInterval(checkPayment);
                                    setPaymentStatus('error');
                                    setPaymentMessage('Payment verification timed out. Contact support.');
                                }
                            } catch (e) { console.error('Status check error:', e); }
                        }, 5000);
                    } else { setPaymentStatus('error'); setPaymentMessage(payData.message || 'Failed to send payment request'); }
                } catch (err) { setPaymentStatus('error'); setPaymentMessage('Connection error. Please try again.'); }
            };

            const getSuffix = (n) => {
                if (n === 1) return 'st';
                if (n === 2) return 'nd';
                if (n === 3) return 'rd';
                return 'th';
            };

            if (loading) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '1.5rem' }}>
                        <div className="football-loader"><div className="football">⚽</div></div>
                        <div style={{ color: 'var(--text-muted)', fontFamily: "'Orbitron', sans-serif" }}>Loading eFootball League 2026...</div>
                    </div>
                );
            }

            return (
                <div>
                    <Navbar player={player} session={session} onLogout={logout} />
                    <div className="container">
                        <div className="dashboard-header">
                            <div style={{ position: 'relative' }}>
                                <img src={player?.photo || `https://ui-avatars.com/api/?name=${session?.name}&background=334e68&color=fff&size=100`} alt="Avatar" className="player-avatar" />
                            </div>
                            <div className="player-info">
                                <h2>{session?.name}</h2>
                                <div className="player-team"><span>⚽</span><span>{player?.team || player?.preferred_team || session?.preferred_team || 'No team assigned'}</span></div>
                            </div>
                            <div className="quick-stats">
                                <div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--primary-400)' }}>{typeof position === 'number' ? `${position}${getSuffix(position)}` : '-'}</div><div className="quick-stat-label">Position</div></div>
                                <div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--warning)' }}>{stats.points}</div><div className="quick-stat-label">Points</div></div>
                                <div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--success)' }}>{stats.wins}</div><div className="quick-stat-label">Wins</div></div>
                                <div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--info)', fontSize: '1.3rem' }}>{teamStrength}</div><div className="quick-stat-label">Strength</div></div>
                            </div>
                        </div>

                        <div className="dashboard-grid">
                            <StatCard icon="🎮" value={stats.played} label="Matches Played" />
                            <StatCard icon="✅" value={stats.wins} label="Wins" />
                            <StatCard icon="🤝" value={stats.draws} label="Draws" />
                            <StatCard icon="❌" value={stats.losses} label="Losses" />
                        </div>

                        <div className="content-grid">
                            <div>
                                <Card title="📈 Recent Form">{form.length > 0 ? (<div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>{form.map((f, i) => <FormBadge key={i} result={f} />)}</div>) : (<p className="text-center text-muted">No matches played yet</p>)}</Card>
                                <Card title="📅 Upcoming Matches">{fixtures.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>{fixtures.map((f, i) => (<div key={i} style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '1rem' }}><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}><span style={{ color: 'var(--primary-400)' }}>{new Date(f.date).toLocaleDateString()}</span><span className={`badge badge-${f.isHome ? 'info' : 'neutral'}`}>{f.isHome ? 'HOME' : 'AWAY'}</span></div><div style={{ textAlign: 'center' }}><span>{session?.name}</span><span style={{ margin: '0 0.75rem', padding: '0.2rem 0.5rem', background: 'var(--bg-card)', borderRadius: '4px' }}>VS</span><span>{f.opponent?.name || 'TBD'}</span></div></div>))}</div>) : (<p className="text-center text-muted">No upcoming fixtures</p>)}</Card>
                                <Card title="📋 Recent Results">{results.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>{results.map((r, i) => (<div key={i} style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '0.75rem 1rem', borderLeft: `3px solid var(--${r.result === 'W' ? 'success' : r.result === 'D' ? 'warning' : 'error'})`, display: 'flex', justifyContent: 'space-between' }}><div><span>{session?.name}</span><span style={{ margin: '0 0.5rem' }}>vs</span><span>{r.opponent?.name}</span></div><span style={{ fontWeight: 600 }}>{r.pScore} - {r.oScore}</span></div>))}</div>) : (<p className="text-center text-muted">No results yet</p>)}</Card>
                            </div>

                            <div>
                                <Card title="⚽ Goals"><div style={{ display: 'flex', justifyContent: 'space-around', padding: '1rem 0' }}><div style={{ textAlign: 'center' }}><div style={{ fontSize: '2.5rem', fontWeight: 800, color: 'var(--success)' }}>{stats.gf}</div><div>Scored</div></div><div style={{ textAlign: 'center' }}><div style={{ fontSize: '2.5rem', fontWeight: 800, color: 'var(--error)' }}>{stats.ga}</div><div>Conceded</div></div></div></Card>
                                <Card title="🏆 Tournaments 2026">
                                    {availableTournaments.length > 0 ? (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                                            {availableTournaments.map((t) => (
                                                <div key={t.id} style={{ background: t.alreadyJoined ? 'rgba(6, 182, 212, 0.1)' : 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '1rem', border: t.alreadyJoined ? '1px solid var(--primary-500)' : '1px solid var(--border-color)' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                                                        <span style={{ fontWeight: 600 }}>{t.name}</span>
                                                        <span style={{ fontWeight: 700, color: 'var(--warning)' }}>{t.entry_fee > 0 ? `KES ${t.entry_fee}` : 'FREE'}</span>
                                                    </div>
                                                    {t.alreadyJoined ? (
                                                        <div style={{ color: 'var(--primary-400)', fontSize: '0.85rem', textAlign: 'center', padding: '0.5rem', background: 'rgba(6,182,212,0.2)', borderRadius: 'var(--radius-sm)' }}>✓ Already Joined</div>
                                                    ) : t.canJoin ? (
                                                        <button onClick={() => openPaymentModal(t)} className="btn btn-success" style={{ width: '100%', padding: '0.5rem', fontSize: '0.85rem' }}>Pay & Join</button>
                                                    ) : (
                                                        <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.8rem' }}>Registration Closed</div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ) : <p className="text-center text-muted">No tournaments available</p>}
                                </Card>
                                <Card title="🧾 Payment Receipts">
                                    {paymentReceipts.length > 0 ? (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                                            {paymentReceipts.map((r) => (
                                                <div key={r.id} style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '0.75rem' }}>
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                        <div><span style={{ fontWeight: 700, color: 'var(--success)' }}>KES {r.amount}</span><div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>{r.transaction_code || 'M-Pesa'}</div></div>
                                                        <button onClick={() => downloadReceipt(r.id)} className="receipt-btn"><i className="fas fa-download"></i> Receipt</button>
                                                    </div>
                                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '0.5rem' }}>{new Date(r.completed_at || r.created_at).toLocaleString()}</div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : <p className="text-center text-muted">No receipts yet</p>}
                                </Card>
                            </div>
                        </div>
                    </div>

                    {/* Payment Modal */}
                    {showPaymentModal && paymentTournament && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <h3 style={{ marginBottom: '1rem' }}>Pay to Join {paymentTournament.name}</h3>
                                <div style={{ fontSize: '2rem', fontWeight: 700, color: 'var(--success)', textAlign: 'center', marginBottom: '1rem' }}>KES {paymentTournament.entry_fee}</div>
                                {paymentStatus === '' && (
                                    <>
                                        <input type="tel" value={paymentPhone} onChange={(e) => setPaymentPhone(e.target.value)} placeholder="0712345678" style={{ width: '100%', padding: '0.75rem', marginBottom: '1rem', borderRadius: 'var(--radius-md)', background: 'var(--bg-tertiary)', border: '1px solid var(--border-color)', color: 'white' }} />
                                        {paymentMessage && <div style={{ color: 'var(--error)', marginBottom: '1rem' }}>{paymentMessage}</div>}
                                        <div style={{ display: 'flex', gap: '0.75rem' }}><button onClick={() => setShowPaymentModal(false)} className="btn btn-secondary">Cancel</button><button onClick={processPayment} className="btn btn-success">Pay Now</button></div>
                                    </>
                                )}
                                {(paymentStatus === 'sending' || paymentStatus === 'waiting') && <div style={{ textAlign: 'center' }}><Spinner size={40} /><p>{paymentMessage}</p></div>}
                                {paymentStatus === 'success' && <div style={{ textAlign: 'center', color: 'var(--success)' }}>✅ {paymentMessage}</div>}
                                {paymentStatus === 'error' && <div style={{ textAlign: 'center' }}><p style={{ color: 'var(--error)' }}>{paymentMessage}</p><button onClick={() => { setPaymentStatus(''); setPaymentMessage(''); }} className="btn btn-primary">Try Again</button></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
    <!-- Removed broken Firebase notifications script to fix console error -->
</body>
</html>
