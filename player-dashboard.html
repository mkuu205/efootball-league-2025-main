<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - eFootball League 2026</title>
    <link rel="icon" href="/icons/icon-192x192.png" sizes="192x192" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/theme.css">
    <script>
        // Initialize theme immediately to prevent flash
        (function() {
            const theme = localStorage.getItem('efl-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        /* Dashboard Header with Player Info */
        .dashboard-header {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .dashboard-header .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary-500);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            object-fit: cover;
        }
        .dashboard-header .player-info h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }
        .dashboard-header .player-team {
            color: var(--primary-400);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .dashboard-header .quick-stats {
            margin-left: auto;
            display: flex;
            gap: 1.5rem;
            text-align: center;
        }
        .dashboard-header .quick-stat {
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
        }
        .dashboard-header .quick-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }
        .dashboard-header .quick-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Stats Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        /* Enhanced Stat Card */
        .stat-card-enhanced {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card-enhanced::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
        }
        .stat-card-enhanced:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-color: var(--primary-500);
        }
        .stat-card-enhanced .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }
        .stat-card-enhanced .stat-value {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card-enhanced .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        /* Card Enhancements */
        .card {
            border-radius: var(--radius-lg) !important;
            overflow: hidden;
        }
        .card-header {
            background: rgba(6, 182, 212, 0.1) !important;
            border-bottom: 1px solid var(--border-color) !important;
            font-weight: 600;
        }
        
        /* Form badges */
        .form-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .form-W { background: var(--success); color: white; }
        .form-D { background: var(--warning); color: #1a1a2e; }
        .form-L { background: var(--error); color: white; }
        
        /* Desktop nav styles */
        .desktop-nav {
            display: flex !important;
        }
        
        /* Skill rating slider */
        .skill-rating-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .skill-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-tertiary);
            border-radius: 3px;
            outline: none;
        }
        .skill-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-500);
            cursor: pointer;
            border: none;
        }
        .skill-value-badge {
            background: var(--primary-500);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 45px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .dashboard-header { flex-direction: column; text-align: center; }
            .dashboard-header .quick-stats { margin-left: 0; margin-top: 1rem; }
            .dashboard-header .player-info { text-align: center; }
        }
        @media (max-width: 768px) {
            .desktop-nav {
                display: none !important;
            }
            .hide-mobile {
                display: none !important;
            }
        }
        @media (max-width: 640px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .dashboard-header .quick-stats { gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
            .stat-card-enhanced .stat-value { font-size: 1.5rem; }
        }
        
        /* Receipt card styles */
        .receipt-card {
            transition: all 0.2s ease;
        }
        .receipt-card:hover {
            border-color: var(--primary-500);
            transform: translateX(2px);
        }
        .download-receipt-btn {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .download-receipt-btn:hover {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;">
            <div class="football-loader">
                <div class="football">⚽</div>
                <div class="football-shadow"></div>
            </div>
            <div style="color: var(--text-muted); font-size: 0.9rem; font-family: 'Orbitron', sans-serif; letter-spacing: 1px;">Loading EFL 2026...</div>
        </div>
    </div>
    
    <style>
        .football-loader {
            position: relative;
            width: 60px;
            height: 80px;
        }
        .football {
            font-size: 3rem;
            animation: bounce 0.6s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.5));
        }
        .football-shadow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 10px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: shadow 0.6s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        @keyframes shadow {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.4; }
            50% { transform: translateX(-50%) scale(0.6); opacity: 0.2; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Supabase client initialization
        let supabaseInstance = null;
        
        function getSupabaseInstance() {
            if (!supabaseInstance) {
                supabaseInstance = window.supabase.createClient(
                    'https://zliedzrqzvywlsyfggcq.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsaWVkenJxenZ5d2xzeWZnZ2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwOTE4NjYsImV4cCI6MjA3NjY2Nzg2Nn0.NbzEZ4ievehtrlyOxCK_mheb7YU4SnNgC0uXuOKPNOI'
                );
            }
            return supabaseInstance;
        }
        
        const supabase = getSupabaseInstance();
        
        const Spinner = ({ size = 24 }) => (
            <div className="spinner" style={{ width: size, height: size }}></div>
        );

        // Navbar Component
        const Navbar = ({ player, session, onLogout }) => {
            return (
                <nav className="navbar">
                    <div style={{ 
                        display: 'flex', 
                        alignItems: 'center', 
                        justifyContent: 'space-between',
                        width: '100%',
                        maxWidth: '1400px',
                        margin: '0 auto',
                        padding: '0 1.5rem'
                    }}>
                        <a href="/" className="navbar-brand" style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', textDecoration: 'none' }}>
                            <div className="navbar-logo" style={{
                                width: '45px',
                                height: '45px',
                                background: 'var(--gradient-primary)',
                                borderRadius: '50%',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontWeight: 800,
                                fontSize: '1rem',
                                color: 'white',
                                fontFamily: "'Orbitron', sans-serif"
                            }}>EFL</div>
                            <span className="navbar-title hide-mobile" style={{ fontFamily: "'Orbitron', sans-serif", fontWeight: 700, color: 'var(--text-primary)' }}>eFootball League 2026</span>
                        </a>

                        <div className="desktop-nav hide-mobile" style={{ display: 'flex', alignItems: 'center', gap: '1.5rem' }}>
                            <img 
                                src={player?.photo || `https://ui-avatars.com/api/?name=${session?.name}&background=334e68&color=fff`}
                                alt="Avatar"
                                style={{ width: 36, height: 36, borderRadius: '50%', border: '2px solid var(--primary-500)', objectFit: 'cover' }}
                            />
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <span style={{ fontWeight: 500, fontSize: '0.9rem' }}>{session?.name}</span>
                                <span style={{ color: 'var(--text-muted)' }}>•</span>
                                <span style={{ fontSize: '0.85rem', color: 'var(--primary-400)' }}>{player?.team || '-'}</span>
                            </div>
                        </div>

                        <span 
                            onClick={onLogout}
                            style={{ 
                                color: 'var(--text-muted)', 
                                cursor: 'pointer', 
                                fontSize: '0.9rem',
                                transition: 'color 0.2s'
                            }}
                            onMouseOver={(e) => e.target.style.color = 'var(--error)'}
                            onMouseOut={(e) => e.target.style.color = 'var(--text-muted)'}
                        >
                            Logout
                        </span>
                    </div>
                </nav>
            );
        };

        const StatCard = ({ value, label, suffix = '', icon, color }) => (
            <div className="stat-card-enhanced animate-fade-in">
                {icon && <div className="stat-icon">{icon}</div>}
                <div className="stat-value" style={color ? { background: color, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' } : {}}>
                    {value}{suffix}
                </div>
                <div className="stat-label">{label}</div>
            </div>
        );

        const FormBadge = ({ result }) => (
            <span className={`form-badge form-${result}`}>{result}</span>
        );

        const Card = ({ title, children, action }) => (
            <div className="card" style={{ marginBottom: '1.5rem' }}>
                <div className="card-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span>{title}</span>
                    {action}
                </div>
                <div className="card-body">{children}</div>
            </div>
        );

        // Generate PDF receipt
        const generateReceiptPDF = (payment, playerName, tournamentName) => {
            const receiptHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>EFL 2026 Payment Receipt</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; color: #1e293b; }
                        .receipt-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #06b6d4; padding-bottom: 20px; }
                        .logo { font-size: 28px; font-weight: 800; color: #06b6d4; font-family: monospace; }
                        .title { font-size: 20px; font-weight: 600; margin-top: 5px; }
                        .receipt-details { margin: 20px 0; }
                        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
                        .detail-label { font-weight: 600; color: #475569; }
                        .total-row { margin-top: 20px; padding-top: 10px; border-top: 2px solid #06b6d4; font-weight: 700; font-size: 18px; }
                        .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #64748b; }
                        .badge-paid { background: #10b981; color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; font-size: 12px; }
                    </style>
                </head>
                <body>
                    <div class="receipt-header">
                        <div class="logo">⚽ EFL 2026</div>
                        <div class="title">Official Payment Receipt</div>
                        <span class="badge-paid">✓ PAID</span>
                    </div>
                    <div class="receipt-details">
                        <div class="detail-row"><span class="detail-label">Receipt No:</span><span>${payment.id?.slice(0,12) || 'RCP-' + Date.now()}</span></div>
                        <div class="detail-row"><span class="detail-label">Date:</span><span>${new Date(payment.completed_at || payment.created_at).toLocaleString()}</span></div>
                        <div class="detail-row"><span class="detail-label">Player Name:</span><span>${playerName}</span></div>
                        <div class="detail-row"><span class="detail-label">Tournament:</span><span>${tournamentName || 'eFootball League 2026'}</span></div>
                        <div class="detail-row"><span class="detail-label">Transaction Code:</span><span><strong>${payment.transaction_code || 'MPESA-' + Date.now()}</strong></span></div>
                        <div class="detail-row"><span class="detail-label">Phone:</span><span>${payment.phone || 'N/A'}</span></div>
                        <div class="total-row detail-row"><span class="detail-label">Amount Paid:</span><span><strong>KES ${payment.amount?.toLocaleString() || 0}</strong></span></div>
                    </div>
                    <div class="footer">
                        <p>eFootball League 2026 • Official Tournament Receipt</p>
                        <p>Thank you for participating! For queries contact: support@efl2026.com</p>
                    </div>
                </body>
                </html>
            `;
            
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:     `EFL2026_Receipt_${payment.transaction_code || payment.id}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, letterRendering: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(receiptHTML).save();
        };

        const Dashboard = () => {
            const [session, setSession] = useState(null);
            const [player, setPlayer] = useState(null);
            const [stats, setStats] = useState({ played: 0, wins: 0, draws: 0, losses: 0, points: 0, gf: 0, ga: 0 });
            const [position, setPosition] = useState('-');
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [newPassword, setNewPassword] = useState('');
            const [confirmNewPassword, setConfirmNewPassword] = useState('');
            const [savingPassword, setSavingPassword] = useState(false);
            const [passwordError, setPasswordError] = useState('');
            const [form, setForm] = useState([]);
            const [fixtures, setFixtures] = useState([]);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showPhotoModal, setShowPhotoModal] = useState(false);
            const [photoUrl, setPhotoUrl] = useState('');
            const [savingPhoto, setSavingPhoto] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [profileData, setProfileData] = useState({
                name: '', username: '', email: '', phone: '', preferred_team: '', skill_rating: 50, bio: ''
            });
            const [savingProfile, setSavingProfile] = useState(false);
            const [profileError, setProfileError] = useState('');
            const [profileSuccess, setProfileSuccess] = useState('');
            const [paidTournaments, setPaidTournaments] = useState([]);
            const [paymentReceipts, setPaymentReceipts] = useState([]);
            const [availableTournaments, setAvailableTournaments] = useState([]);
            const [joiningTournament, setJoiningTournament] = useState(null);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [paymentTournament, setPaymentTournament] = useState(null);
            const [paymentPhone, setPaymentPhone] = useState('');
            const [paymentStatus, setPaymentStatus] = useState('');
            const [paymentMessage, setPaymentMessage] = useState('');
            
            const teamOptions = ['Kenya', 'Chelsea', 'Liverpool', 'Everton', 'Manchester United', 'West Ham', 'Arsenal', 'Manchester City', 'Tottenham', 'Newcastle', 'Real Madrid', 'Barcelona', 'Bayern Munich', 'PSG', 'Juventus', 'Inter Milan', 'AC Milan', 'Borussia Dortmund'];
            
            useEffect(() => {
                const sess = localStorage.getItem('player_session') || sessionStorage.getItem('player_session');
                if (!sess) {
                    window.location.href = '/player-login.html';
                    return;
                }
                const data = JSON.parse(sess);
                setSession(data);
                loadDashboardData(data);
                
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('change_password') === '1' || data.must_change_password) {
                    setShowPasswordModal(true);
                }
                
                const hasIncompleteProfile = !data.email || !data.phone || data.email?.includes('@placeholder');
                if (hasIncompleteProfile && !data.must_change_password) {
                    setProfileData({
                        name: data.name || '',
                        username: data.username || '',
                        email: data.email?.includes('@placeholder') ? '' : (data.email || ''),
                        phone: data.phone || '',
                        preferred_team: data.preferred_team || data.team || '',
                        skill_rating: data.skill_rating || 50,
                        bio: data.bio || ''
                    });
                    setShowProfileModal(true);
                }
            }, []);

            const loadDashboardData = async (sess) => {
                try {
                    const { data: account } = await supabase
                        .from('player_accounts')
                        .select('*')
                        .eq('id', sess.account_id || sess.id)
                        .single();

                    try {
                        const tournamentsRes = await fetch('/api/tournaments');
                        const tournamentsData = await tournamentsRes.json();
                        if (tournamentsData.success) {
                            const allTournaments = (tournamentsData.tournaments || [])
                                .map(t => ({ ...t, alreadyJoined: false, canJoin: t.status === 'registration_open' }));
                            setAvailableTournaments(allTournaments);
                        }
                    } catch (e) { console.error('Error loading tournaments:', e); }

                    if (!account?.player_id) {
                        setPlayer({ ...account, photo: account.photo_url || null, team: account.preferred_team || null, skill_rating: account.skill_rating || 50 });
                        setLoading(false);
                        return;
                    }

                    const { data: playerData } = await supabase
                        .from('players')
                        .select('*')
                        .eq('id', account.player_id)
                        .single();

                    setPlayer({ ...playerData, ...account, photo: account.photo_url || playerData?.photo || null, team: account.preferred_team || playerData?.team || null, skill_rating: account.skill_rating || playerData?.skill_rating || 50 });

                    const [playersRes, resultsRes, fixturesRes] = await Promise.all([
                        supabase.from('players').select('*'),
                        supabase.from('results').select('*'),
                        supabase.from('fixtures').select('*')
                    ]);

                    const allPlayers = playersRes.data || [];
                    const allResults = resultsRes.data || [];
                    const allFixtures = fixturesRes.data || [];

                    const playerResults = allResults.filter(r => r.home_player_id === account.player_id || r.away_player_id === account.player_id);
                    let calcStats = { played: 0, wins: 0, draws: 0, losses: 0, points: 0, gf: 0, ga: 0 };
                    
                    playerResults.forEach(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        calcStats.played++;
                        calcStats.gf += pScore || 0;
                        calcStats.ga += oScore || 0;
                        if (pScore > oScore) { calcStats.wins++; calcStats.points += 3; }
                        else if (pScore === oScore) { calcStats.draws++; calcStats.points += 1; }
                        else { calcStats.losses++; }
                    });
                    setStats(calcStats);

                    const leagueTable = allPlayers.map(p => {
                        const pResults = allResults.filter(r => r.home_player_id === p.id || r.away_player_id === p.id);
                        let pts = 0, gd = 0;
                        pResults.forEach(r => {
                            const isHome = r.home_player_id === p.id;
                            const pScore = isHome ? r.home_score : r.away_score;
                            const oScore = isHome ? r.away_score : r.home_score;
                            gd += (pScore || 0) - (oScore || 0);
                            if (pScore > oScore) pts += 3;
                            else if (pScore === oScore) pts += 1;
                        });
                        return { id: p.id, pts, gd };
                    }).sort((a, b) => b.pts - a.pts || b.gd - a.gd);
                    const pos = leagueTable.findIndex(p => p.id === account.player_id) + 1;
                    setPosition(pos > 0 ? pos : '-');

                    const recentForm = playerResults.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5).map(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        if (pScore > oScore) return 'W';
                        if (pScore === oScore) return 'D';
                        return 'L';
                    }).reverse();
                    setForm(recentForm);

                    const upcomingFixtures = allFixtures.filter(f => !f.played && (f.home_player_id === account.player_id || f.away_player_id === account.player_id)).slice(0, 3).map(f => {
                        const isHome = f.home_player_id === account.player_id;
                        const opponent = allPlayers.find(p => p.id === (isHome ? f.away_player_id : f.home_player_id));
                        return { ...f, opponent, isHome };
                    });
                    setFixtures(upcomingFixtures);

                    const recentResults = playerResults.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3).map(r => {
                        const isHome = r.home_player_id === account.player_id;
                        const opponent = allPlayers.find(p => p.id === (isHome ? r.away_player_id : r.home_player_id));
                        const pScore = isHome ? r.home_score : r.away_score;
                        const oScore = isHome ? r.away_score : r.home_score;
                        let result = 'D';
                        if (pScore > oScore) result = 'W';
                        else if (pScore < oScore) result = 'L';
                        return { ...r, opponent, pScore, oScore, result };
                    });
                    setResults(recentResults);

                    const { data: paymentsData } = await supabase
                        .from('payments')
                        .select('*')
                        .eq('player_account_id', account.id)
                        .eq('status', 'completed')
                        .order('created_at', { ascending: false });
                    
                    setPaymentReceipts(paymentsData || []);
                    const tournaments = (paymentsData || []).filter(p => p.payment_type).map(p => ({ id: p.id, name: p.payment_type === 'registration' ? 'eFootball League 2026' : p.reference || 'Tournament', type: p.payment_type, amount: p.amount, paidAt: p.completed_at || p.created_at, transactionCode: p.transaction_code }));
                    setPaidTournaments(tournaments);
                    
                    const { data: participantData } = await supabase
                        .from('tournament_participants')
                        .select('tournament_id, tournaments(id, name)')
                        .or(`player_id.eq.${account.player_id},player_account_id.eq.${account.id}`);
                    
                    try {
                        const tournamentsRes = await fetch('/api/tournaments');
                        const tournamentsData = await tournamentsRes.json();
                        const paidTournamentIds = (paymentsData || []).map(p => p.tournament_id);
                        const participantTournamentIds = (participantData || []).map(p => p.tournament_id);
                        const joinedIds = [...new Set([...paidTournamentIds, ...participantTournamentIds])];
                        if (tournamentsData.success) {
                            const allTournaments = (tournamentsData.tournaments || []).map(t => ({ ...t, alreadyJoined: joinedIds.includes(t.id), canJoin: t.status === 'registration_open' && !joinedIds.includes(t.id) }));
                            setAvailableTournaments(allTournaments);
                        }
                    } catch (e) { console.error('Error loading tournaments:', e); }
                } catch (err) { console.error('Error loading dashboard:', err); } finally { setLoading(false); }
            };

            const logout = () => { localStorage.removeItem('player_session'); sessionStorage.removeItem('player_session'); window.location.href = '/player-login.html'; };
            const formatPhoneNumber = (phone) => { if (!phone) return null; let cleaned = phone.replace(/[\s\-\(\)]/g, ''); if (cleaned.startsWith('+254')) cleaned = cleaned.substring(1); else if (cleaned.startsWith('0')) cleaned = '254' + cleaned.substring(1); else if (cleaned.startsWith('7') || cleaned.startsWith('1')) cleaned = '254' + cleaned; return /^254\d{9}$/.test(cleaned) ? cleaned : null; };
            
            const openPaymentModal = (tournament) => {
                const savedPhone = formatPhoneNumber(session?.phone);
                setPaymentTournament(tournament);
                setPaymentPhone(savedPhone ? '0' + savedPhone.substring(3) : '');
                setPaymentStatus('');
                setPaymentMessage('');
                setShowPaymentModal(true);
            };

            const processPayment = async () => {
                const tournament = paymentTournament;
                const phoneNumber = formatPhoneNumber(paymentPhone);
                if (!phoneNumber) { setPaymentMessage('Please enter a valid phone number'); return; }
                setPaymentStatus('sending');
                setPaymentMessage('Sending M-Pesa request...');
                try {
                    const payRes = await fetch('/api/payflow/stk-push', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: phoneNumber, amount: tournament.entry_fee, reference: `TOURN${tournament.id}_${session?.account_id || session?.id}`, description: `Tournament: ${tournament.name}`, account_id: session?.account_id || session?.id, tournament_id: tournament.id })
                    });
                    const payData = await payRes.json();
                    if (payData.success) {
                        setPaymentStatus('waiting');
                        setPaymentMessage('Check your phone for M-Pesa prompt and enter your PIN');
                        let attempts = 0;
                        const checkPayment = setInterval(async () => {
                            attempts++;
                            try {
                                const statusRes = await fetch('/api/payflow/status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ checkout_request_id: payData.checkout_request_id }) });
                                const statusData = await statusRes.json();
                                if (statusData.status === 'completed') {
                                    clearInterval(checkPayment);
                                    setPaymentStatus('success');
                                    setPaymentMessage('Payment received! Adding you to tournament...');
                                    const joinRes = await fetch('/api/tournaments/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tournament_id: tournament.id, player_account_id: session?.account_id || session?.id, payment_id: statusData.payment_id }) });
                                    const joinData = await joinRes.json();
                                    if (joinData.success) {
                                        setPaymentMessage(`Success! You're in ${tournament.name}!`);
                                        setTimeout(() => { setShowPaymentModal(false); loadDashboardData(session); }, 2000);
                                    } else { setPaymentStatus('error'); setPaymentMessage(joinData.message || 'Failed to join tournament'); }
                                } else if (statusData.status === 'failed' || attempts >= 24) {
                                    clearInterval(checkPayment);
                                    setPaymentStatus('error');
                                    setPaymentMessage(attempts >= 24 ? 'Payment verification timed out.' : 'Payment failed or cancelled');
                                }
                            } catch (e) { console.error(e); }
                        }, 5000);
                    } else { setPaymentStatus('error'); setPaymentMessage(payData.message || 'Failed to send payment request'); }
                } catch (err) { setPaymentStatus('error'); setPaymentMessage('Connection error. Please try again.'); }
            };

            const openPhotoModal = () => { setPhotoUrl(player?.photo || ''); setShowPhotoModal(true); };
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) { alert('Please select an image file'); return; }
                if (file.size > 500 * 1024) { alert('Image must be less than 500KB.'); return; }
                setUploading(true);
                const reader = new FileReader();
                reader.onload = (event) => { setPhotoUrl(event.target.result); setUploading(false); };
                reader.onerror = () => { alert('Failed to read image.'); setUploading(false); };
                reader.readAsDataURL(file);
            };
            const savePhoto = async () => {
                if (!photoUrl.trim()) return;
                setSavingPhoto(true);
                try {
                    if (player?.id) await supabase.from('players').update({ photo: photoUrl }).eq('id', player.id);
                    const accountId = session?.account_id || session?.id;
                    if (accountId) await supabase.from('player_accounts').update({ photo_url: photoUrl }).eq('id', accountId);
                    setPlayer(prev => ({ ...prev, photo: photoUrl }));
                    const updatedSession = { ...session, photo_url: photoUrl };
                    localStorage.setItem('player_session', JSON.stringify(updatedSession));
                    sessionStorage.setItem('player_session', JSON.stringify(updatedSession));
                    setSession(updatedSession);
                    setShowPhotoModal(false);
                } catch (err) { alert('Failed to save photo.'); } finally { setSavingPhoto(false); }
            };

            const changePassword = async () => {
                setPasswordError('');
                if (!newPassword || !confirmNewPassword) { setPasswordError('Please fill in both password fields'); return; }
                if (newPassword.length < 6) { setPasswordError('Password must be at least 6 characters'); return; }
                if (newPassword !== confirmNewPassword) { setPasswordError('Passwords do not match'); return; }
                setSavingPassword(true);
                try {
                    const res = await fetch('/api/player/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ account_id: session?.account_id || session?.id, new_password: newPassword }) });
                    const data = await res.json();
                    if (data.success) {
                        const updatedSession = { ...session, must_change_password: false };
                        localStorage.setItem('player_session', JSON.stringify(updatedSession));
                        setSession(updatedSession);
                        setShowPasswordModal(false);
                        setNewPassword('');
                        setConfirmNewPassword('');
                        alert('Password changed successfully!');
                    } else { setPasswordError(data.message || 'Failed to change password'); }
                } catch (err) { setPasswordError('Connection error.'); } finally { setSavingPassword(false); }
            };

            const openProfileModal = () => {
                setProfileData({
                    name: session?.name || '', username: session?.username || '', email: session?.email || '', phone: session?.phone || '',
                    preferred_team: session?.preferred_team || session?.team || '', skill_rating: session?.skill_rating || 50, bio: session?.bio || ''
                });
                setProfileError(''); setProfileSuccess(''); setShowProfileModal(true);
            };
            
            const formatPhoneForSave = (phone) => { if (!phone) return ''; let cleaned = phone.replace(/\D/g, ''); if (cleaned.startsWith('0')) cleaned = '254' + cleaned.slice(1); if (cleaned.startsWith('7') || cleaned.startsWith('1')) cleaned = '254' + cleaned; if (cleaned.startsWith('+')) cleaned = cleaned.slice(1); return cleaned; };
            
            const saveProfile = async () => {
                setProfileError(''); setProfileSuccess('');
                if (!profileData.name?.trim()) { setProfileError('Name is required'); return; }
                const formattedPhone = formatPhoneForSave(profileData.phone);
                if (profileData.phone && !/^254\d{9}$/.test(formattedPhone)) { setProfileError('Phone must be a valid Kenyan number'); return; }
                setSavingProfile(true);
                try {
                    const res = await fetch('/api/player/update-profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ account_id: session?.account_id || session?.id, name: profileData.name, username: profileData.username || null, email: profileData.email || null, phone: formattedPhone || null, preferred_team: profileData.preferred_team || null, skill_rating: profileData.skill_rating || 50, bio: profileData.bio || null }) });
                    const data = await res.json();
                    if (data.success) {
                        const updatedSession = { ...session, name: profileData.name, username: profileData.username, email: profileData.email, phone: formattedPhone, preferred_team: profileData.preferred_team, team: profileData.preferred_team, skill_rating: profileData.skill_rating, bio: profileData.bio, must_complete_profile: false };
                        localStorage.setItem('player_session', JSON.stringify(updatedSession));
                        setSession(updatedSession);
                        setPlayer(prev => ({ ...prev, name: profileData.name, team: profileData.preferred_team, skill_rating: profileData.skill_rating }));
                        setProfileSuccess('Profile updated successfully!');
                        setTimeout(() => { setShowProfileModal(false); setProfileSuccess(''); }, 1500);
                    } else { setProfileError(data.message || 'Failed to update profile'); }
                } catch (err) { setProfileError('Connection error.'); } finally { setSavingProfile(false); }
            };

            const getSuffix = (n) => { if (n === 1) return 'st'; if (n === 2) return 'nd'; if (n === 3) return 'rd'; return 'th'; };
            
            const getSkillLevelLabel = (rating) => {
                if (rating <= 30) return 'Rookie 🟢';
                if (rating <= 55) return 'Amateur 🔵';
                if (rating <= 75) return 'Competitor 🟡';
                if (rating <= 89) return 'Elite 🔴';
                return 'Legend ⚫';
            };

            if (loading) {
                return ( <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '1.5rem' }}><div className="football-loader"><div className="football">⚽</div><div className="football-shadow"></div></div><div style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>Loading EFL 2026...</div></div> );
            }

            return (
                <div>
                    <Navbar player={player} session={session} onLogout={logout} />
                    <div className="container" style={{ padding: '1.5rem' }}>
                        <div className="dashboard-header">
                            <div style={{ position: 'relative' }}>
                                <img src={player?.photo || `https://ui-avatars.com/api/?name=${session?.name}&background=334e68&color=fff&size=100`} alt="Avatar" className="player-avatar" onClick={openPhotoModal} style={{ cursor: 'pointer' }} />
                                <button onClick={openPhotoModal} style={{ position: 'absolute', bottom: 0, right: 0, width: '28px', height: '28px', borderRadius: '50%', background: 'var(--primary-500)', border: '2px solid var(--bg-card)', color: 'white', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem' }}><i className="fas fa-camera"></i></button>
                            </div>
                            <div className="player-info"><h2>{session?.name}</h2><div className="player-team"><span>⚽</span><span>{player?.team || player?.preferred_team || session?.preferred_team || 'No team assigned'}</span></div></div>
                            <div className="quick-stats"><div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--primary-400)' }}>{typeof position === 'number' ? `${position}${getSuffix(position)}` : '-'}</div><div className="quick-stat-label">Position</div></div><div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--warning)' }}>{stats.points}</div><div className="quick-stat-label">Points</div></div><div className="quick-stat"><div className="quick-stat-value" style={{ color: 'var(--success)' }}>{stats.wins}</div><div className="quick-stat-label">Wins</div></div></div>
                        </div>

                        <div className="dashboard-grid">
                            <StatCard icon="🎮" value={stats.played} label="Matches Played" />
                            <StatCard icon="✅" value={stats.wins} label="Wins" color="linear-gradient(135deg, #10B981, #059669)" />
                            <StatCard icon="🤝" value={stats.draws} label="Draws" color="linear-gradient(135deg, #F59E0B, #D97706)" />
                            <StatCard icon="❌" value={stats.losses} label="Losses" color="linear-gradient(135deg, #EF4444, #DC2626)" />
                        </div>

                        <div className="content-grid">
                            <div>
                                <Card title="📈 Recent Form">{form.length > 0 ? (<div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>{form.map((f, i) => <FormBadge key={i} result={f} />)}</div>) : (<p className="text-center text-muted">No matches played yet</p>)}</Card>
                                <Card title="📅 EFL 2026 Tournament - Upcoming Matches">{fixtures.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>{fixtures.map((f, i) => (<div key={i} style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '1rem' }}><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}><span style={{ color: 'var(--primary-400)', fontSize: '0.85rem' }}>{new Date(f.date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}</span><span className={`badge badge-${f.isHome ? 'info' : 'neutral'}`}>{f.isHome ? 'HOME' : 'AWAY'}</span></div><div style={{ textAlign: 'center' }}><span>{session?.name}</span><span style={{ margin: '0 0.75rem', padding: '0.2rem 0.5rem', background: 'var(--bg-card)', borderRadius: '4px', fontSize: '0.75rem' }}>VS</span><span>{f.opponent?.name || 'TBD'}</span></div></div>))}</div>) : (<p className="text-center text-muted">No upcoming fixtures</p>)}</Card>
                                <Card title="📋 EFL 2026 - Recent Results">{results.length > 0 ? (<div>{results.map((r, i) => (<div key={i} style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '0.75rem 1rem', marginBottom: '0.5rem', borderLeft: `3px solid var(--${r.result === 'W' ? 'success' : r.result === 'D' ? 'warning' : 'error'})`, display: 'flex', justifyContent: 'space-between' }}><div><span>{session?.name}</span><span style={{ margin: '0 0.5rem', color: 'var(--text-muted)' }}>vs</span><span>{r.opponent?.name}</span></div><span style={{ background: 'var(--bg-card)', padding: '0.25rem 0.75rem', borderRadius: 'var(--radius-sm)' }}>{r.pScore} - {r.oScore}</span></div>))}</div>) : (<p className="text-center text-muted">No results yet</p>)}</Card>
                            </div>

                            <div>
                                <Card title="⚽ Goals"><div style={{ display: 'flex', justifyContent: 'space-around', padding: '1rem 0' }}><div style={{ textAlign: 'center' }}><div style={{ fontSize: '2.5rem', fontWeight: 800, color: 'var(--success)' }}>{stats.gf}</div><div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Scored</div></div><div style={{ width: '2px', height: '50px', background: 'var(--border-color)' }}></div><div style={{ textAlign: 'center' }}><div style={{ fontSize: '2.5rem', fontWeight: 800, color: 'var(--error)' }}>{stats.ga}</div><div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Conceded</div></div></div><div style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '0.75rem', textAlign: 'center' }}><span>Goal Difference: </span><span style={{ fontWeight: 700, color: (stats.gf - stats.ga) >= 0 ? 'var(--success)' : 'var(--error)' }}>{(stats.gf - stats.ga) >= 0 ? '+' : ''}{stats.gf - stats.ga}</span></div></Card>
                                <Card title="📊 Win Rate"><div style={{ textAlign: 'center', padding: '1rem 0' }}><div style={{ fontSize: '3rem', fontWeight: 800, background: 'var(--gradient-primary)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0}%</div><div>{stats.wins} wins from {stats.played} matches</div></div><div style={{ background: 'var(--bg-tertiary)', borderRadius: '10px', height: '10px', overflow: 'hidden' }}><div style={{ width: `${stats.played > 0 ? (stats.wins / stats.played) * 100 : 0}%`, height: '100%', background: 'var(--gradient-primary)' }}></div></div></Card>
                                <Card title="🏆 EFL 2026 - League Position"><div style={{ textAlign: 'center', padding: '1rem 0' }}><div style={{ fontSize: '3.5rem', fontWeight: 800, background: typeof position === 'number' && position <= 3 ? 'linear-gradient(135deg, #FFD700, #FFA500)' : 'var(--gradient-primary)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{typeof position === 'number' ? `#${position}` : '-'}</div><div>{typeof position === 'number' && position === 1 ? '🥇 Leader!' : typeof position === 'number' && position === 2 ? '🥈 2nd Place' : typeof position === 'number' && position === 3 ? '🥉 3rd Place' : 'Current Standing'}</div><div style={{ display: 'flex', justifyContent: 'center', gap: '1rem', marginTop: '1rem', padding: '0.75rem', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)' }}><div><div style={{ fontWeight: 700, color: 'var(--success)' }}>{stats.points}</div><div style={{ fontSize: '0.7rem' }}>PTS</div></div><div><div>{stats.played}</div><div style={{ fontSize: '0.7rem' }}>P</div></div><div><div style={{ color: 'var(--success)' }}>{stats.wins}</div><div style={{ fontSize: '0.7rem' }}>W</div></div><div><div style={{ color: 'var(--warning)' }}>{stats.draws}</div><div style={{ fontSize: '0.7rem' }}>D</div></div><div><div style={{ color: 'var(--error)' }}>{stats.losses}</div><div style={{ fontSize: '0.7rem' }}>L</div></div></div></div></Card>
                                
                                <Card title="📋 Profile Settings">
                                    <div style={{ fontSize: '0.9rem' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.6rem 0.75rem', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', marginBottom: '0.4rem' }}><span>👤</span><span style={{ color: 'var(--text-muted)', minWidth: '50px' }}>Name</span><span style={{ flex: 1 }}>{session?.name || 'Not set'}</span></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.6rem 0.75rem', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', marginBottom: '0.4rem' }}><span>🎯</span><span style={{ color: 'var(--text-muted)', minWidth: '50px' }}>Skill Rating</span><span style={{ flex: 1 }}><strong>{session?.skill_rating || 50}</strong> / 100 ({getSkillLevelLabel(session?.skill_rating || 50)})</span></div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0.6rem 0.75rem', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', marginBottom: '0.75rem' }}><span>📱</span><span style={{ color: 'var(--text-muted)', minWidth: '50px' }}>Phone</span><span style={{ flex: 1 }}>{session?.phone || 'Not set'}</span></div>
                                        <button onClick={openProfileModal} className="btn btn-primary" style={{ width: '100%', padding: '0.75rem' }}><i className="fas fa-user-edit" style={{ marginRight: '0.5rem' }}></i>Edit Profile</button>
                                    </div>
                                </Card>

                                <Card title="🏆 All Tournaments (2026)">
                                    {availableTournaments.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>{availableTournaments.map((t, i) => (<div key={i} style={{ background: t.alreadyJoined ? 'linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(59, 130, 246, 0.15))' : 'var(--bg-tertiary)', border: t.alreadyJoined ? '1px solid rgba(6, 182, 212, 0.3)' : '1px solid var(--border-color)', borderRadius: 'var(--radius-md)', padding: '1rem' }}><div style={{ display: 'flex', justifyContent: 'space-between' }}><div><strong>{t.name}</strong> {t.alreadyJoined && <span style={{ background: 'var(--primary-500)', padding: '0.15rem 0.4rem', borderRadius: '10px', fontSize: '0.65rem', marginLeft: '0.5rem' }}>JOINED</span>}</div><div><span style={{ fontSize: '0.85rem', fontWeight: 700, color: 'var(--warning)' }}>KES {t.entry_fee}</span></div></div><div style={{ fontSize: '0.75rem', marginTop: '0.5rem' }}>📅 {new Date(t.start_date).toLocaleDateString()}</div>{t.canJoin ? (<button onClick={() => openPaymentModal(t)} style={{ marginTop: '0.75rem', width: '100%', padding: '0.5rem', background: 'var(--gradient-secondary)', border: 'none', borderRadius: 'var(--radius-sm)', color: 'white', fontWeight: 600, cursor: 'pointer' }}>Pay & Join</button>) : t.alreadyJoined ? (<div style={{ marginTop: '0.75rem', textAlign: 'center', color: 'var(--primary-400)' }}>✓ Registered</div>) : (<div style={{ marginTop: '0.75rem', textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.8rem' }}>Registration closed</div>)}</div>))}</div>) : (<p className="text-center text-muted">No tournaments available</p>)}
                                </Card>

                                <Card title="🧾 Payment Receipts (Download PDF)">
                                    {paymentReceipts.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>{paymentReceipts.map((r, i) => (<div key={i} className="receipt-card" style={{ background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-md)', padding: '1rem', border: '1px solid var(--border-color)' }}><div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '0.5rem' }}><div><span style={{ fontWeight: 700, color: 'var(--success)' }}>KES {r.amount}</span><div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>{r.transaction_code}</div></div><button onClick={() => generateReceiptPDF(r, session?.name, 'eFootball League 2026')} className="download-receipt-btn" style={{ padding: '0.4rem 0.8rem', borderRadius: 'var(--radius-sm)', fontSize: '0.75rem', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '0.3rem' }}><i className="fas fa-download"></i> PDF</button></div><div style={{ fontSize: '0.7rem', marginTop: '0.5rem' }}>{new Date(r.completed_at || r.created_at).toLocaleDateString()}</div></div>))}</div>) : (<p className="text-center text-muted">No payment receipts available</p>)}
                                </Card>
                            </div>
                        </div>
                    </div>

                    {/* Modals (Photo, Password, Payment, Profile) - simplified for brevity but functional */}
                    {showPhotoModal && (<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }} onClick={() => setShowPhotoModal(false)}><div style={{ background: 'var(--bg-card)', padding: '1.5rem', borderRadius: 'var(--radius-lg)', maxWidth: '400px' }} onClick={e => e.stopPropagation()}><h3>Update Photo</h3><input type="file" accept="image/*" onChange={handleFileUpload} /><input type="url" value={photoUrl} onChange={(e) => setPhotoUrl(e.target.value)} placeholder="Image URL" style={{ width: '100%', margin: '0.5rem 0' }} /><button onClick={savePhoto} disabled={savingPhoto}>Save</button><button onClick={() => setShowPhotoModal(false)}>Cancel</button></div></div>)}
                    {showPasswordModal && (<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1001 }}><div style={{ background: 'var(--bg-card)', padding: '1.5rem', borderRadius: 'var(--radius-lg)', maxWidth: '400px' }}><h3>Change Password</h3><input type="password" placeholder="New Password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} /><input type="password" placeholder="Confirm" value={confirmNewPassword} onChange={(e) => setConfirmNewPassword(e.target.value)} /><button onClick={changePassword}>Update</button></div></div>)}
                    {showProfileModal && (<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1002, overflow: 'auto' }}><div style={{ background: 'var(--bg-card)', padding: '1.5rem', borderRadius: 'var(--radius-lg)', maxWidth: '500px', width: '90%' }}><h3>Profile Settings</h3><input placeholder="Full Name" value={profileData.name} onChange={(e) => setProfileData({...profileData, name: e.target.value})} style={{ width: '100%', marginBottom: '0.75rem' }} /><input placeholder="Email" value={profileData.email} onChange={(e) => setProfileData({...profileData, email: e.target.value})} /><input placeholder="Phone (0712345678)" value={profileData.phone} onChange={(e) => setProfileData({...profileData, phone: e.target.value})} /><input placeholder="Preferred Team" value={profileData.preferred_team} onChange={(e) => setProfileData({...profileData, preferred_team: e.target.value})} /><div><label>🎮 Skill Rating (1-100): <strong>{profileData.skill_rating}</strong></label><input type="range" min="1" max="100" value={profileData.skill_rating} onChange={(e) => setProfileData({...profileData, skill_rating: parseInt(e.target.value)})} className="skill-slider" style={{ width: '100%' }} /><div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '0.25rem' }}>{getSkillLevelLabel(profileData.skill_rating)}</div></div><textarea placeholder="Bio" rows="2" value={profileData.bio} onChange={(e) => setProfileData({...profileData, bio: e.target.value})}></textarea><button onClick={saveProfile} disabled={savingProfile}>Save Profile</button><button onClick={() => setShowProfileModal(false)}>Cancel</button></div></div>)}
                    {showPaymentModal && paymentTournament && (<div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1003 }}><div style={{ background: 'var(--bg-card)', padding: '1.5rem', borderRadius: 'var(--radius-lg)', maxWidth: '380px' }}><h3>Pay KES {paymentTournament.entry_fee}</h3><input type="tel" placeholder="0712345678" value={paymentPhone} onChange={(e) => setPaymentPhone(e.target.value)} /><button onClick={processPayment}>Pay Now</button><button onClick={() => setShowPaymentModal(false)}>Cancel</button><p>{paymentMessage}</p></div></div>)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
