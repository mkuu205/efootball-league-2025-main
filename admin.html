<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFL 2026 | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --sidebar-width: 280px;
            --header-height: 64px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1050;
            overflow-y: auto;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .sidebar-nav {
            padding: 1rem 0;
        }

        .sidebar-nav-item {
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .sidebar-nav-item:hover, .sidebar-nav-item.active {
            background: var(--bg-primary);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .sidebar-nav-item i {
            width: 24px;
        }

        /* Main Content */
        .main-content {
            margin-left: 0;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        .main-content.sidebar-open {
            margin-left: var(--sidebar-width);
        }

        /* Header */
        .app-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1040;
        }

        /* Cards */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        /* Tables */
        .table-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-custom th {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-custom td {
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* Forms */
        .form-control, .form-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
        }

        .form-control:focus, .form-select:focus {
            background: var(--bg-secondary);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1100;
        }

        .toast-custom {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        .toast-custom.success { border-left: 4px solid var(--success); }
        .toast-custom.error { border-left: 4px solid var(--danger); }
        .toast-custom.warning { border-left: 4px solid var(--warning); }
        .toast-custom.info { border-left: 4px solid var(--info); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: block;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1045;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        /* Badges */
        .badge-pending {
            background: var(--warning);
            color: #000;
        }

        /* Loading Spinner */
        .spinner-sm {
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
            }
            .main-content {
                margin-left: var(--sidebar-width);
            }
            .menu-toggle {
                display: none;
            }
        }

        @media (max-width: 767px) {
            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <!-- Overlay -->
    <div class="overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-futbol me-2"></i> EFL 2026
        </div>
        <div class="sidebar-nav">
            <div class="sidebar-nav-item" data-page="dashboard">
                <i class="fas fa-chart-line"></i> Dashboard
            </div>
            <div class="sidebar-nav-item" data-page="players">
                <i class="fas fa-users"></i> Players
            </div>
            <div class="sidebar-nav-item" data-page="registrations">
                <i class="fas fa-user-check"></i> Registrations
                <span class="badge bg-warning ms-auto" id="sidebarPendingBadge" style="display: none;">0</span>
            </div>
            <div class="sidebar-nav-item" data-page="fixtures">
                <i class="fas fa-calendar-alt"></i> Fixtures
            </div>
            <div class="sidebar-nav-item" data-page="results">
                <i class="fas fa-futbol"></i> Results
            </div>
            <div class="sidebar-nav-item" data-page="leaguetable">
                <i class="fas fa-table"></i> League Table
            </div>
            <div class="sidebar-nav-item" data-page="tournaments">
                <i class="fas fa-trophy"></i> Tournaments
            </div>
            <div class="sidebar-nav-item" data-page="tools">
                <i class="fas fa-tools"></i> Tools
            </div>
            <div class="sidebar-nav-item" data-page="notifications">
                <i class="fas fa-bell"></i> Notifications
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="app-header d-flex justify-content-between align-items-center">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="d-flex align-items-center gap-3">
                <span id="syncStatus" class="badge bg-success">
                    <i class="fas fa-cloud-upload-alt me-1"></i> Online
                </span>
                <span id="lastSyncTime" class="text-secondary small">Last sync: --</span>
                <button class="btn btn-sm btn-outline-primary" onclick="manualSync()">
                    <i class="fas fa-sync-alt me-1"></i> Refresh
                </button>
                <button class="btn btn-sm btn-outline-danger" id="logoutBtn">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </button>
            </div>
        </div>

        <div class="container-fluid p-4">
            <!-- Login Section -->
            <div id="loginSection" class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px;">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <div style="width: 64px; height: 64px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                                    <i class="fas fa-crown fa-2x"></i>
                                </div>
                                <h4>Admin Access</h4>
                                <p class="text-secondary">eFootball League 2026 Control Panel</p>
                            </div>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="adminEmail" placeholder="admin@efl.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" required>
                                    <div class="invalid-feedback d-none" id="passwordError"></div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                                    <i class="fas fa-lock me-2"></i> Login
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Content (hidden until login) -->
            <div id="dashboardContent" style="display: none;">
                <!-- Dynamic page content will be loaded here -->
                <div id="pageContent"></div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        // Replace with your actual Supabase credentials
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';
        
        let supabase = null;
        let currentUser = null;
        let currentPage = 'dashboard';
        
        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-custom ${type}`;
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            toast.innerHTML = `
                <i class="fas ${icons[type]}"></i>
                <span style="flex: 1;">${message}</span>
                <i class="fas fa-times" style="cursor: pointer;" onclick="this.parentElement.remove()"></i>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        // ==================== AUTHENTICATION ====================
        async function initSupabase() {
            try {
                supabase = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                if (!supabase) {
                    // Fallback to mock for demo - in production, ensure Supabase is loaded
                    console.warn('Supabase not loaded, using mock auth');
                    return false;
                }
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    showDashboard();
                }
                return true;
            } catch (e) {
                console.error('Supabase init error:', e);
                return false;
            }
        }
        
        async function handleLogin(email, password) {
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-sm me-2"></span> Authenticating...';
            
            try {
                let response;
                if (supabase) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    response = { success: true, user: data.user };
                } else {
                    // Mock login for demo - replace with real API call
                    const apiRes = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    response = await apiRes.json();
                    if (!apiRes.ok) throw new Error(response.message || 'Login failed');
                }
                
                if (response.success) {
                    currentUser = response.user;
                    showToast('Login successful! Welcome back.', 'success');
                    showDashboard();
                    document.getElementById('loginForm').reset();
                }
            } catch (error) {
                showToast(error.message || 'Invalid email or password', 'error');
                const errorDiv = document.getElementById('passwordError');
                errorDiv.textContent = error.message || 'Invalid credentials';
                errorDiv.classList.remove('d-none');
                setTimeout(() => errorDiv.classList.add('d-none'), 3000);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        }
        
        async function handleLogout() {
            if (supabase) await supabase.auth.signOut();
            currentUser = null;
            localStorage.removeItem('admin_session');
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('dashboardContent').style.display = 'none';
            showToast('Logged out successfully', 'info');
        }
        
        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            loadPage('dashboard');
            loadAllData();
        }
        
        // ==================== PAGE LOADING ====================
        function loadPage(page) {
            currentPage = page;
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            
            const content = document.getElementById('pageContent');
            switch(page) {
                case 'dashboard': renderDashboard(); break;
                case 'players': renderPlayers(); break;
                case 'registrations': renderRegistrations(); break;
                case 'fixtures': renderFixtures(); break;
                case 'results': renderResults(); break;
                case 'leaguetable': renderLeagueTable(); break;
                case 'tournaments': renderTournaments(); break;
                case 'tools': renderTools(); break;
                case 'notifications': renderNotifications(); break;
                default: renderDashboard();
            }
        }
        
        // ==================== DASHBOARD ====================
        function renderDashboard() {
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            const fixtures = JSON.parse(localStorage.getItem('efl_fixtures') || '[]');
            const results = JSON.parse(localStorage.getItem('efl_results') || '[]');
            const registrations = JSON.parse(localStorage.getItem('efl_regs') || '[]');
            const pending = registrations.filter(r => r.payment_status !== 'completed' || !r.player_id).length;
            
            document.getElementById('pageContent').innerHTML = `
                <h4 class="mb-4">Dashboard Overview</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-3"><div class="stat-card"><i class="fas fa-users fa-2x mb-2 text-primary"></i><div class="fs-2 fw-bold">${players.length}</div><div>Total Players</div></div></div>
                    <div class="col-md-3"><div class="stat-card"><i class="fas fa-calendar fa-2x mb-2 text-info"></i><div class="fs-2 fw-bold">${fixtures.length}</div><div>Fixtures</div></div></div>
                    <div class="col-md-3"><div class="stat-card"><i class="fas fa-futbol fa-2x mb-2 text-success"></i><div class="fs-2 fw-bold">${results.length}</div><div>Results</div></div></div>
                    <div class="col-md-3"><div class="stat-card"><i class="fas fa-user-clock fa-2x mb-2 text-warning"></i><div class="fs-2 fw-bold">${pending}</div><div>Pending Registrations</div></div></div>
                </div>
                <div class="row">
                    <div class="col-md-6"><div class="card bg-transparent border-secondary"><div class="card-header bg-transparent border-secondary">Recent Results</div><div class="card-body"><div id="recentResultsList" class="small">Loading...</div></div></div></div>
                    <div class="col-md-6"><div class="card bg-transparent border-secondary"><div class="card-header bg-transparent border-secondary">Upcoming Fixtures</div><div class="card-body"><div id="upcomingFixturesList" class="small">Loading...</div></div></div></div>
                </div>
            `;
            // Load recent data
            loadRecentResults();
            loadUpcomingFixtures();
        }
        
        function loadRecentResults() {
            const results = JSON.parse(localStorage.getItem('efl_results') || '[]');
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            const recent = results.slice(-5).reverse();
            const html = recent.map(r => {
                const home = players.find(p => p.id === r.home_player_id)?.name || '?';
                const away = players.find(p => p.id === r.away_player_id)?.name || '?';
                return `<div class="d-flex justify-content-between border-bottom py-2"><span>${home} vs ${away}</span><span class="fw-bold">${r.home_score} - ${r.away_score}</span></div>`;
            }).join('');
            document.getElementById('recentResultsList').innerHTML = html || '<div class="text-secondary">No results yet</div>';
        }
        
        function loadUpcomingFixtures() {
            const fixtures = JSON.parse(localStorage.getItem('efl_fixtures') || '[]');
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            const upcoming = fixtures.filter(f => !f.played).slice(0,5);
            const html = upcoming.map(f => {
                const home = players.find(p => p.id === f.home_player_id)?.name || '?';
                const away = players.find(p => p.id === f.away_player_id)?.name || '?';
                return `<div class="d-flex justify-content-between border-bottom py-2"><span>${home} vs ${away}</span><span class="text-secondary">${f.date}</span></div>`;
            }).join('');
            document.getElementById('upcomingFixturesList').innerHTML = html || '<div class="text-secondary">No upcoming fixtures</div>';
        }
        
        // ==================== LEAGUE TABLE ====================
        function renderLeagueTable() {
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            const results = JSON.parse(localStorage.getItem('efl_results') || '[]');
            
            const stats = {};
            players.forEach(p => {
                stats[p.id] = { name: p.name, team: p.team, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, points: 0 };
            });
            
            results.forEach(r => {
                const home = stats[r.home_player_id];
                const away = stats[r.away_player_id];
                if (home && away) {
                    home.played++; away.played++;
                    home.gf += r.home_score; home.ga += r.away_score;
                    away.gf += r.away_score; away.ga += r.home_score;
                    
                    if (r.home_score > r.away_score) {
                        home.won++; home.points += 3;
                        away.lost++;
                    } else if (r.away_score > r.home_score) {
                        away.won++; away.points += 3;
                        home.lost++;
                    } else {
                        home.drawn++; away.drawn++;
                        home.points += 1; away.points += 1;
                    }
                }
            });
            
            const table = Object.values(stats).map(s => ({
                ...s,
                gd: s.gf - s.ga
            })).sort((a,b) => b.points - a.points || b.gd - a.gd);
            
            document.getElementById('pageContent').innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>League Standings</h4>
                    <button class="btn btn-sm btn-outline-primary" onclick="exportLeagueTableCSV()"><i class="fas fa-download me-1"></i>Export CSV</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-custom">
                        <thead><tr><th>#</th><th>Player</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>PTS</th></tr></thead>
                        <tbody>
                            ${table.map((s, i) => `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.team || '-'}</td><td>${s.played}</td><td>${s.won}</td><td>${s.drawn}</td><td>${s.lost}</td><td>${s.gf}</td><td>${s.ga}</td><td>${s.gd}</td><td class="fw-bold">${s.points}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        
        // ==================== SMART FIXTURE GENERATOR ====================
        function generateRoundRobinFixtures() {
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            if (players.length < 2) {
                showToast('Need at least 2 players to generate fixtures', 'warning');
                return;
            }
            
            const existingFixtures = JSON.parse(localStorage.getItem('efl_fixtures') || '[]');
            const existingKeys = new Set(existingFixtures.map(f => `${f.home_player_id}-${f.away_player_id}`));
            
            const playerIds = players.map(p => p.id);
            const newFixtures = [];
            
            for (let i = 0; i < playerIds.length; i++) {
                for (let j = i + 1; j < playerIds.length; j++) {
                    const key1 = `${playerIds[i]}-${playerIds[j]}`;
                    const key2 = `${playerIds[j]}-${playerIds[i]}`;
                    if (!existingKeys.has(key1) && !existingKeys.has(key2)) {
                        const today = new Date();
                        const futureDate = new Date(today);
                        futureDate.setDate(today.getDate() + newFixtures.length + 1);
                        newFixtures.push({
                            id: 'f' + Date.now() + newFixtures.length,
                            date: futureDate.toISOString().split('T')[0],
                            home_player_id: playerIds[i],
                            away_player_id: playerIds[j],
                            played: false
                        });
                    }
                }
            }
            
            if (newFixtures.length === 0) {
                showToast('All possible fixtures already scheduled', 'info');
                return;
            }
            
            const allFixtures = [...existingFixtures, ...newFixtures];
            localStorage.setItem('efl_fixtures', JSON.stringify(allFixtures));
            showToast(`Generated ${newFixtures.length} new fixtures`, 'success');
            if (currentPage === 'fixtures') renderFixtures();
            loadAllData();
        }
        
        // ==================== EXPORT FUNCTIONS ====================
        window.exportLeagueTableCSV = function() {
            const players = JSON.parse(localStorage.getItem('efl_players') || '[]');
            const results = JSON.parse(localStorage.getItem('efl_results') || '[]');
            const stats = {};
            players.forEach(p => { stats[p.id] = { name: p.name, team: p.team, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, points: 0 }; });
            results.forEach(r => {
                const home = stats[r.home_player_id], away = stats[r.away_player_id];
                if (home && away) {
                    home.played++; away.played++;
                    home.gf += r.home_score; home.ga += r.away_score;
                    away.gf += r.away_score; away.ga += r.home_score;
                    if (r.home_score > r.away_score) { home.won++; home.points += 3; away.lost++; }
                    else if (r.away_score > r.home_score) { away.won++; away.points += 3; home.lost++; }
                    else { home.drawn++; away.drawn++; home.points += 1; away.points += 1; }
                }
            });
            const table = Object.values(stats).map(s => ({ ...s, gd: s.gf - s.ga })).sort((a,b) => b.points - a.points || b.gd - a.gd);
            const headers = ['Name','Team','Played','Won','Drawn','Lost','GF','GA','GD','Points'];
            const rows = table.map(s => [s.name, s.team, s.played, s.won, s.drawn, s.lost, s.gf, s.ga, s.gd, s.points]);
            const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'league_table.csv'; a.click();
            URL.revokeObjectURL(url);
            showToast('League table exported', 'success');
        };
        
        // ==================== SYNC STATUS ====================
        let lastSync = new Date();
        function updateSyncStatus() {
            const statusEl = document.getElementById('syncStatus');
            const timeEl = document.getElementById('lastSyncTime');
            if (navigator.onLine) {
                statusEl.className = 'badge bg-success';
                statusEl.innerHTML = '<i class="fas fa-cloud-upload-alt me-1"></i> Online';
            } else {
                statusEl.className = 'badge bg-secondary';
                statusEl.innerHTML = '<i class="fas fa-cloud-off-alt me-1"></i> Offline';
            }
            timeEl.textContent = `Last sync: ${lastSync.toLocaleTimeString()}`;
        }
        
        window.manualSync = function() {
            lastSync = new Date();
            loadAllData();
            updateSyncStatus();
            showToast('Data synchronized', 'success');
        };
        
        // ==================== DATA LOADING ====================
        function loadAllData() {
            // Refresh current page if it has data
            if (currentPage === 'players') renderPlayers();
            else if (currentPage === 'registrations') renderRegistrations();
            else if (currentPage === 'fixtures') renderFixtures();
            else if (currentPage === 'results') renderResults();
            else if (currentPage === 'leaguetable') renderLeagueTable();
            else if (currentPage === 'dashboard') renderDashboard();
            updateSyncStatus();
        }
        
        // Placeholder render functions (simplified - in production these would fetch from API)
        function renderPlayers() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Players management - Connected to backend</div>'; }
        function renderRegistrations() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Registrations management</div>'; }
        function renderFixtures() { document.getElementById('pageContent').innerHTML = '<div class="d-flex justify-content-between mb-3"><h4>Fixtures</h4><button class="btn btn-primary btn-sm" onclick="generateRoundRobinFixtures()"><i class="fas fa-magic me-1"></i>Generate Round Robin</button></div><div class="alert alert-info">Fixtures list will appear here</div>'; }
        function renderResults() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Results management</div>'; }
        function renderTournaments() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Tournaments management</div>'; }
        function renderTools() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Tools panel</div>'; }
        function renderNotifications() { document.getElementById('pageContent').innerHTML = '<div class="alert alert-info">Notifications system</div>'; }
        
        // ==================== EVENT LISTENERS ====================
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            handleLogin(email, password);
        });
        
        document.getElementById('logoutBtn').addEventListener('click', handleLogout);
        
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
        });
        
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        });
        
        document.querySelectorAll('.sidebar-nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const page = item.dataset.page;
                if (page) loadPage(page);
                if (window.innerWidth < 768) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarOverlay').classList.remove('show');
                }
            });
        });
        
        window.generateRoundRobinFixtures = generateRoundRobinFixtures;
        
        // Initialize
        initSupabase();
        updateSyncStatus();
        setInterval(updateSyncStatus, 30000);
        
        // Check for existing session
        if (localStorage.getItem('admin_session')) {
            showDashboard();
        }
    </script>
</body>
</html>
